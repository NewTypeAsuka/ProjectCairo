<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 뷰포트 -->
    <meta author="NewTypeAsuka">
    <meta description="외부 IP 변동 알림 서비스">
    <meta keywords="외부IP, 공유기, 알림 서비스, 이메일, 문자, IP변동">
    <title>외부 IP 변동 알림 서비스</title>
    <!-- 소셜 미디어 공유 시 정보 -->
    <meta property="og:title" content="">
    <meta property="og:description" content="">
    <meta property="og:image" content="">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <h1>외부 IP 변동 알림 서비스</h1>
    </header>

    <main>
        <!-- 1페이지 -->
        <section id="page1" class="page active">
            <p>외부 IP 변동을 알려드립니다. 이메일 또는 문자 중 알림 방식을 선택해주세요.</p>
            <div class="checkbox-group">
                <label><input type="checkbox" id="emailAlert" /> 이메일 알림</label>
                <label><input type="checkbox" id="smsAlert" /> 문자 알림</label>
            </div>
            <button id="toPage2Btn" class="btn">다음</button>
        </section>

        <!-- 2페이지 -->
        <section id="page2" class="page">
            <form id="alertForm">
                <div id="emailInputGroup" class="input-group hidden">
                    <label for="emailInput">이메일 주소</label>
                    <input type="email" id="emailInput" placeholder="example@domain.com" />
                </div>

                <div id="smsInputGroup" class="input-group hidden">
                    <label for="smsInput">핸드폰 번호</label>
                    <input type="tel" id="smsInput" placeholder="010-1234-5678" />
                </div>

                <div class="input-group">
                    <label for="ipInput">현재 외부 IP</label>
                    <input type="text" id="ipInput" placeholder="자동 입력 가능" />
                    <button type="button" id="autoIpBtn" class="btn">외부 IP 자동입력</button>
                </div>

                <button type="submit" class="btn submitBtn">제출</button>
            </form>
        </section>
    </main>
</body>
</html>
